<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fox Family Tree</title>
    <style>
        :root {
            --bg-color: #fdfaf2;
            --primary-warm: #8c2d19;
            --text-color: #4e342e;
            --box-bg: #ffffff;
            --border-color: #d7ccc8;
            --gen-bg-0: #efebe9;
            --gen-bg-1: #fbe9e7;
            --gen-bg-2: #ffccbc;
            --gen-bg-3: #ffab91;
            --gen-bg-4: #ff8a65;
            --shadow: 0 4px 8px rgba(140, 45, 25, 0.12);
            --hover-shadow: 0 8px 16px rgba(140, 45, 25, 0.22);
        }

        body {
            font-family: 'Segoe UI', Calibri, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: var(--primary-warm);
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            font-style: italic;
            margin-bottom: 30px;
            color: #795548;
        }

        /* Floating Zoom Controls */
        .zoom-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--box-bg);
            padding: 10px 15px;
            border-radius: 30px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            border: 2px solid var(--primary-warm);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
        }

        .zoom-panel button {
            background: var(--primary-warm);
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .zoom-panel button:hover {
            background: #b03a24;
        }

        .zoom-panel button.btn-reset {
            border-radius: 20px;
            width: auto;
            padding: 0 12px;
            font-size: 0.85em;
        }

        .zoom-panel input[type="range"] {
            cursor: pointer;
            accent-color: var(--primary-warm);
            width: 100px;
        }

        .zoom-label {
            font-size: 0.85em;
            font-weight: bold;
            min-width: 40px;
            text-align: center;
        }

        .tree-viewport {
            width: 100%;
            overflow: auto;
            padding-bottom: 40px;
            border: 1px solid transparent;
        }

        /* Target wrapper for applying scale adjustments */
        #zoomWrapper {
            transform-origin: top center;
            transition: transform 0.15s ease-out;
            width: max-content;
            margin: 0 auto;
        }

        .tree-container {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 60px;
            padding: 20px;
            width: max-content;
        }

        .generation-envelope {
            border: 2px dashed #a1887f;
            border-radius: 12px;
            padding: 35px 25px 25px 25px;
            position: relative;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .generation-envelope::before {
            content: attr(data-gen);
            position: absolute;
            top: -12px;
            left: 20px;
            background-color: var(--bg-color);
            padding: 0 12px;
            font-weight: bold;
            color: var(--primary-warm);
            font-size: 0.95em;
        }

        .gen-0 { background-color: var(--gen-bg-0); }
        .gen-1 { background-color: var(--gen-bg-1); }
        .gen-2 { background-color: var(--gen-bg-2); }
        .gen-3 { background-color: var(--gen-bg-3); }
        .gen-4 { background-color: var(--gen-bg-4); }

        .person-node {
            background: var(--box-bg);
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            text-align: center;
            cursor: pointer;
            min-width: 155px;
            max-width: 190px;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            z-index: 2;
        }

        .person-node:hover {
            transform: translateY(-4px);
            box-shadow: var(--hover-shadow);
            border-color: var(--primary-warm);
        }

        .person-name {
            font-weight: bold;
            font-size: 0.95em;
            margin-bottom: 4px;
            word-wrap: break-word;
        }

        .person-year {
            font-size: 0.8em;
            color: #5d4037;
        }

        .lines-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Modal Settings */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(62, 39, 35, 0.5);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--bg-color);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
            width: 95vw;
            max-width: 1400px;
            max-height: 90vh;
            overflow: auto;
            border: 3px solid var(--primary-warm);
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 2em;
            cursor: pointer;
            color: var(--primary-warm);
            font-weight: bold;
        }

        .modal-tree-container {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 50px;
            align-items: center;
            padding: 20px;
            width: max-content;
            margin: 0 auto;
        }

        .modal-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            width: 100%;
        }

        .current-focused-node {
            border: 2.5px solid var(--primary-warm);
            background-color: #fffde7;
        }
    </style>
</head>

        // Zoom Management functions
        function setZoom(value) {
            globalZoom = parseFloat(value);
            document.getElementById('zoomSlider').value = globalZoom;
            document.getElementById('zoomLabel').innerText = `${Math.round(globalZoom * 100)}%`;
            document.getElementById('zoomWrapper').style.transform = `scale(${globalZoom})`;
        }

        function adjustZoom(delta) {
            let newVal = Math.min(Math.max(globalZoom + delta, 0.2), 1.5);
            setZoom(newVal);
        }

        function resetZoom() {
            setZoom(1);
        }

        // Structural offset calculator that is immune to CSS transforms scale distortions
        function getElementOffset(el, targetContainer) {
            let left = 0;
            let top = 0;
            while (el && el !== targetContainer) {
                left += el.offsetLeft;
                top += el.offsetTop;
                el = el.offsetParent;
            }
            return { left, top };
        }

        function buildMainTree() {
            const containers = {
                0: document.getElementById('main-gen-0'),
                1: document.getElementById('main-gen-1'),
                2: document.getElementById('main-gen-2'),
                3: document.getElementById('main-gen-3'),
                4: document.getElementById('main-gen-4')
            };

            const sortedMembers = Object.values(familyDataset).sort((a, b) => {
                if (a.gen !== b.gen) return a.gen - b.gen;
                const pA = familyDataset[a.parent];
                const pB = familyDataset[b.parent];
                const pOrderA = pA ? pA.birthOrder : 0;
                const pOrderB = pB ? pB.birthOrder : 0;
                if (pOrderA !== pOrderB) return pOrderA - pOrderB;
                return a.birthOrder - b.birthOrder;
            });

            sortedMembers.forEach(member => {
                if (containers[member.gen]) {
                    const node = createNodeElement(member, false);
                    containers[member.gen].appendChild(node);
                }
            });

            setTimeout(() => drawLayoutLines('mainTree', 'mainSvg'), 300);
        }

        function createNodeElement(member, isModal, isCurrent = false) {
            const div = document.createElement('div');
            div.id = (isModal ? 'modal-node-' : 'node-') + member.id;
            div.className = `person-node ${isCurrent ? 'current-focused-node' : ''}`;
            div.innerHTML = `<div class="person-name">${member.name}</div><div class="person-year">${member.year || '&nbsp;'}</div>`;
            
            if (isModal) {
                if (isCurrent) {
                    div.onclick = () => {
                        if (!member.parent) {
                            closeModal();
                        } else {
                            initiateModal(member.parent);
                        }
                    };
                } else {
                    div.onclick = () => initiateModal(member.id);
                }
            } else {
                div.onclick = () => initiateModal(member.id);
            }
            return div;
        }

        function initiateModal(id) {
            const target = familyDataset[id];
            if (!target) return;

            document.getElementById('modalParentRow').innerHTML = '';
            document.getElementById('modalSelfSiblingsRow').innerHTML = '';
            document.getElementById('modalChildrenBranches').innerHTML = '';

            if (target.parent) {
                const parentNode = createNodeElement(familyDataset[target.parent], true, true);
                document.getElementById('modalParentRow').appendChild(parentNode);
            }

            const siblings = Object.values(familyDataset).filter(m => m.parent === target.parent && m.gen === target.gen);
            siblings.sort((a, b) => a.birthOrder - b.birthOrder);
            siblings.forEach(sib => {
                const sNode = createNodeElement(sib, true, sib.id === id);
                document.getElementById('modalSelfSiblingsRow').appendChild(sNode);
            });

            let downstreamGen = target.gen + 1;
            let currentParentIds = [id];
            
            while (true) {
                const descendants = Object.values(familyDataset).filter(m => currentParentIds.includes(m.parent) && m.gen === downstreamGen);
                if (descendants.length === 0) break;

                descendants.sort((a, b) => {
                    const pA = familyDataset[a.parent];
                    const pB = familyDataset[b.parent];
                    if (pA.birthOrder !== pB.birthOrder) return pA.birthOrder - pB.birthOrder;
                    return a.birthOrder - b.birthOrder;
                });

                const envelope = document.createElement('div');
                envelope.className = `generation-envelope gen-${downstreamGen}`;
                envelope.setAttribute('data-gen', `Generation ${downstreamGen}`);
                
                descendants.forEach(desc => {
                    envelope.appendChild(createNodeElement(desc, true, false));
                });

                document.getElementById('modalChildrenBranches').appendChild(envelope);
                currentParentIds = descendants.map(d => d.id);
                downstreamGen++;
            }

            document.getElementById('modalOverlay').style.display = 'flex';
            setTimeout(() => drawLayoutLines('modalTree', 'modalSvg', true, id), 100);
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        function handleOutsideClick(e) {
            if (e.target.id === 'modalOverlay') closeModal();
        }

        function drawLayoutLines(containerId, svgId, isModal = false, focusId = null) {
            const container = document.getElementById(containerId);
            const svg = document.getElementById(svgId);
            svg.innerHTML = '';

            const prefix = isModal ? 'modal-node-' : 'node-';

            Object.values(familyDataset).forEach(member => {
                const element = document.getElementById(prefix + member.id);
                if (!element || !member.parent) return;

                const parentElement = document.getElementById(prefix + member.parent);
                if (!parentElement) return;

                const pOffset = getElementOffset(parentElement, container);
                const cOffset = getElementOffset(element, container);

                const px = pOffset.left + parentElement.offsetWidth / 2;
                const py = pOffset.top + parentElement.offsetHeight;
                const cx = cOffset.left + element.offsetWidth / 2;
                const cy = cOffset.top;

                const midY = (py + cy) / 2;

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', `M ${px} ${py} C ${px} ${midY}, ${cx} ${midY}, ${cx} ${cy}`);
                path.setAttribute('stroke', '#8c2d19');
                path.setAttribute('stroke-width', isModal && (member.id === focusId || member.parent === focusId) ? '3' : '1.5');
                path.setAttribute('fill', 'none');
                svg.appendChild(path);
            });
        }

        window.onload = buildMainTree;
        window.onresize = () => {
            drawLayoutLines('mainTree', 'mainSvg');
            if (document.getElementById('modalOverlay').style.display === 'flex') {
                drawLayoutLines('modalTree', 'modalSvg', true);
            }
        };
